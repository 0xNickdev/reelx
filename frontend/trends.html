<style>
.page { padding: 78px 48px 64px; }
.page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; flex-wrap: wrap; gap: 14px; }
.page-title { font-family: 'DM Serif Display', serif; font-size: 2rem; }
.page-sub { font-size: 0.82rem; color: var(--text2); margin-top: 4px; }

/* FILTERS */
.filters-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.f-sep { width: 1px; height: 20px; background: var(--line2); margin: 0 3px; }
.f-btn {
  height: 32px; padding: 0 13px;
  background: transparent; border: 1px solid var(--line2); border-radius: 7px;
  font-size: 0.73rem; color: var(--text2); cursor: pointer;
  font-family: inherit; letter-spacing: 0.02em; transition: all 0.18s;
  white-space: nowrap;
}
.f-btn:hover { border-color: rgba(207,192,176,0.3); color: var(--text); }
.f-btn.on { background: var(--ag); border-color: rgba(207,192,176,0.3); color: var(--ap); }

.filters-bar2 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 8px; }
.search-box { position: relative; flex: 1; max-width: 380px; }
.search-box input {
  width: 100%; height: 34px; background: var(--bg2); border: 1px solid var(--line2);
  border-radius: 8px; padding: 0 13px 0 34px; font-size: 0.78rem;
  color: var(--text); font-family: inherit; outline: none; transition: border-color 0.2s;
}
.search-box input:focus { border-color: rgba(207,192,176,0.3); }
.search-box input::placeholder { color: var(--text2); }
.search-ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 0.75rem; color: var(--text2); }
.sort-group { display: flex; gap: 4px; }

/* CARDS GRID */
.cards-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }

/* CARD */
.trend-card {
  background: var(--bg1); border: 1px solid var(--line);
  border-radius: 10px; overflow: hidden; cursor: pointer;
  transition: border-color 0.22s, transform 0.22s;
  position: relative;
}
.trend-card:hover { border-color: var(--line2); transform: translateY(-3px); }
.trend-card:hover .tc-overlay { opacity: 1; transform: translateY(0); }

.tc-thumb {
  aspect-ratio: 9/16; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.tc-thumb-emoji { font-size: 3rem; opacity: 0.12; }
.tc-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: flex-start; }
.tc-plat {
  display: flex; align-items: center; gap: 5px;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
  padding: 3px 9px; font-size: 0.6rem; color: rgba(255,255,255,0.6);
}
.tc-plat-dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-ig { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#bc1888); }
.dot-tt { background: linear-gradient(135deg,#010101,#69C9D0); }
.dot-yt { background: #ff0000; }
.tc-right { display: flex; gap: 6px; align-items: center; }
.tc-fav {
  width: 28px; height: 28px; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; cursor: pointer; transition: all 0.2s;
}
.tc-fav:hover { border-color: rgba(248,113,113,0.5); }
.tc-fav.liked { color: #f87171; }
.tc-rank {
  width: 24px; height: 24px; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; font-weight: 600; color: rgba(255,255,255,0.5);
}
.tc-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 28px 12px 12px;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
}
.tc-views { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: #fff; }
.tc-time { font-size: 0.62rem; color: rgba(255,255,255,0.45); margin-top: 1px; }
.tc-xf {
  position: absolute; bottom: 12px; right: 12px;
  background: var(--ahl); color: #0c0c0e;
  font-size: 0.6rem; font-weight: 700; padding: 2px 8px; border-radius: 4px;
}
.tc-overlay {
  position: absolute; inset: 0;
  background: rgba(12,12,14,0.72); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: all 0.25s; transform: translateY(6px);
}
.tc-overlay-btn {
  background: var(--ahl); color: #0c0c0e; border: none;
  border-radius: 8px; padding: 10px 22px;
  font-size: 0.78rem; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: background 0.2s;
}
.tc-overlay-btn:hover { background: #f5ede5; }
.tc-info { padding: 12px 14px; border-top: 1px solid var(--line); }
.tc-info-row { display: flex; justify-content: space-between; align-items: flex-start; }
.tc-author { font-size: 0.8rem; font-weight: 500; }
.tc-niche { font-size: 0.68rem; color: var(--text2); }
.tc-cr { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.tc-cr-val { font-size: 0.68rem; color: var(--text2); }
.tc-xf-badge {
  background: var(--ag); border: 1px solid var(--ab);
  color: var(--ap); font-size: 0.65rem; font-weight: 600;
  padding: 2px 8px; border-radius: 4px;
}
/* locked card */
.tc-locked {
  aspect-ratio: 9/16; background: var(--bg2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px;
}
.tc-lock-ico { font-size: 1.2rem; opacity: 0.2; }
.tc-lock-text { font-size: 0.72rem; color: var(--text2); text-align: center; padding: 0 16px; line-height: 1.5; }
.tc-lock-cta { font-size: 0.72rem; color: var(--ap); text-decoration: none; border-bottom: 1px solid rgba(207,192,176,0.3); }
</style>
</head>

<script>
var currentPlatform = 'all';
var currentSort = 'xfactor';
var currentNiche = 'all';

function getPlatIcon(platform) {
  if (platform === 'instagram') return '<div class="tc-plat-dot dot-ig"></div>Instagram';
  if (platform === 'tiktok') return '<div class="tc-plat-dot dot-tt"></div>TikTok';
  if (platform === 'youtube') return '<div class="tc-plat-dot dot-yt"></div>YouTube';
  return platform;
}

function getNicheLabel(niche) {
  var map = {
    'бизнес': 'Бизнес', 'бьюти': 'Бьюти', 'фитнес': 'Фитнес',
    'еда': 'Еда', 'психология': 'Психология', 'мода': 'Мода',
    'tech': 'Tech & AI', 'путешествия': 'Путешествия', 'юмор': 'Юмор',
    'lifestyle': 'Lifestyle'
  };
  return map[niche] || niche || 'Lifestyle';
}

function getBg(platform) {
  if (platform === 'instagram') return 'linear-gradient(160deg,#1a1520,#251830)';
  if (platform === 'tiktok') return 'linear-gradient(160deg,#1c1a1a,#282424)';
  return 'linear-gradient(160deg,#191c1a,#232826)';
}

function getEmoji(niche) {
  var map = {
    'бизнес':'💰','бьюти':'💄','фитнес':'💪','еда':'🍕',
    'психология':'🧠','мода':'👗','tech':'🤖','путешествия':'✈️',
    'юмор':'😂','lifestyle':'✨'
  };
  return map[niche] || '🎯';
}

function renderTrends(items) {
  var grid = document.getElementById('trends-grid');
  if (!items || items.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text2);font-size:0.85rem;">Тренды обновляются… Попробуй позже.</div>';
    return;
  }

  grid.innerHTML = items.map(function(item, i) {
    var cr = item.view_count > 0 ? ((item.like_count / item.view_count) * 100).toFixed(1) : '0.0';
    var thumb = item.thumbnail_url ? '<img src="' + item.thumbnail_url + '" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">' : '';
    var analyzeUrl = isLoggedIn() ? 'analyze.html' : 'login.html';
    
    return '<div class="trend-card" onclick="window.location.href='' + analyzeUrl + '?url=' + encodeURIComponent(item.url) + ''">' +
      '<div class="tc-thumb" style="background:' + getBg(item.platform) + ';position:relative;">' +
        thumb +
        '<div class="tc-thumb-emoji" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.3;">' + getEmoji(item.niche) + '</div>' +
        '<div class="tc-top">' +
          '<div class="tc-plat">' + getPlatIcon(item.platform) + '</div>' +
          '<div class="tc-right">' +
            '<div class="tc-fav" onclick="event.stopPropagation();toggleFav(this)">♡</div>' +
            '<div class="tc-rank">' + (i + 1) + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="tc-bottom">' +
          '<div class="tc-views">' + formatNumber(item.view_count) + '</div>' +
          '<div class="tc-time">' + timeAgo(item.scraped_at) + '</div>' +
        '</div>' +
        '<div class="tc-xf">' + item.xfactor + '×</div>' +
      '</div>' +
      '<div class="tc-overlay"><button class="tc-overlay-btn">Разобрать →</button></div>' +
      '<div class="tc-info">' +
        '<div class="tc-info-row"><div class="tc-author">@' + (item.author || 'unknown') + '</div><div class="tc-niche">' + getNicheLabel(item.niche) + '</div></div>' +
        '<div class="tc-cr"><span class="tc-cr-val">' + cr + '% CR</span><span class="tc-xf-badge">' + item.xfactor + '×</span></div>' +
      '</div>' +
    '</div>';
  }).join('');
}

async function loadTrends() {
  var grid = document.getElementById('trends-grid');
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text2);font-size:0.85rem;">Загружаем тренды…</div>';
  
  try {
    var params = new URLSearchParams({
      platform: currentPlatform,
      sort: currentSort,
      niche: currentNiche,
      limit: 20
    });
    var res = await fetch(API_URL + '/api/trends/feed?' + params);
    var data = await res.json();
    renderTrends(data);
  } catch(e) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text2);">Ошибка загрузки</div>';
  }
}

// Platform filter buttons
document.querySelectorAll('.filters-bar .f-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var txt = btn.textContent.trim();
    if (txt === '📷') currentPlatform = 'instagram';
    else if (txt === '♪') currentPlatform = 'tiktok';
    else if (txt === '▶') currentPlatform = 'youtube';
    else if (txt === 'Все') currentPlatform = 'all';
    loadTrends();
  });
});

// Sort buttons
document.querySelectorAll('.sort-group .f-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var txt = btn.textContent.trim();
    if (txt === 'X-factor' || txt === 'Горячее') currentSort = 'xfactor';
    else if (txt === 'Просмотры') currentSort = 'views';
    else if (txt === 'Свежие') currentSort = 'recent';
    loadTrends();
  });
});

function toggleFav(el) {
  el.classList.toggle('liked');
  el.textContent = el.classList.contains('liked') ? '♥' : '♡';
}

loadTrends();
</script>
